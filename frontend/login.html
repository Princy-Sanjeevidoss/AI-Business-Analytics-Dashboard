<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Business Analytics Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <h1>Business Analytics</h1>
        <p>AI-Powered Operations Dashboard</p>
        
        <div id="error-message" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: var(--border-radius-sm); margin-bottom: 20px; font-size: 0.9rem;"></div>
        
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password" />
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
        </form>
        
        <div class="demo-credentials">
          <h3>Quick Demo Access</h3>
          <div class="demo-credentials-buttons">
            <button class="demo-btn" onclick="autofill('admin', 'admin123')">Demo Admin</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      function autofill(user, pass) {
        document.getElementById('username').value = user;
        document.getElementById('password').value = pass;
        document.getElementById('error-message').style.display = 'none';
      }

      document.getElementById('login-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error-message');
        errorEl.style.display = 'none';
        
        try {
          const data = await login(username, password);
          if (data && data.access_token) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('username', username);
            window.location.href = 'dashboard.html';
          } else {
            errorEl.textContent = 'Unable to login. Invalid response from server.';
            errorEl.style.display = 'block';
          }
        } catch (error) {
          console.error(error);
          errorEl.textContent = 'Login failed: ' + (error.message || 'Incorrect credentials');
          errorEl.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
